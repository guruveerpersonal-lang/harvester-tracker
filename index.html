<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harvester — CropAccess AgriTech</title>
<style>
  :root {
    --green-dark: #1a4731;
    --green: #2d7a4f;
    --green-light: #4caf50;
    --green-pale: #e8f5e9;
    --amber: #f59e0b;
    --amber-light: #fef3c7;
    --red: #ef4444;
    --red-light: #fee2e2;
    --blue: #3b82f6;
    --blue-light: #dbeafe;
    --purple: #8b5cf6;
    --purple-light: #ede9fe;
    --text: #1f2937;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f9fafb;
    --card: #ffffff;
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

  #sidebar {
    width: var(--sidebar-w); background: var(--green-dark); color: #fff;
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
  }
  .sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.12); }
  .sidebar-logo h1 { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
  .sidebar-logo span { font-size: 11px; opacity: .6; display: block; margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500;
    border-left: 3px solid transparent; transition: all .15s; opacity: .75;
  }
  .nav-item:hover { background: rgba(255,255,255,.08); opacity: 1; }
  .nav-item.active { background: rgba(255,255,255,.12); border-left-color: #4caf50; opacity: 1; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.12); font-size: 12px; opacity: .5; }

  #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .topbar h2 { font-size: 18px; font-weight: 700; color: var(--green-dark); }
  .topbar-date { font-size: 13px; color: var(--text-muted); }
  .content { padding: 28px; flex: 1; }

  .view { display: none; }
  .view.active { display: block; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }

  .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
  .stat-val { font-size: 32px; font-weight: 800; margin: 4px 0 2px; }
  .stat-sub { font-size: 12px; color: var(--text-muted); }
  .stat.green .stat-val { color: var(--green); }
  .stat.amber .stat-val { color: var(--amber); }
  .stat.red .stat-val { color: var(--red); }
  .stat.blue .stat-val { color: var(--blue); }

  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .section-title { font-size: 14px; font-weight: 700; color: var(--green-dark); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .progress-bar-wrap { margin-bottom: 10px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .progress-track { background: #f3f4f6; border-radius: 9999px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 9999px; background: var(--green-light); transition: width .4s; }
  .progress-fill.amber { background: var(--amber); }

  .add-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .add-bar input, .add-bar select { border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 14px; background: var(--card); }
  .add-bar input { flex: 1; min-width: 200px; }
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

  .kanban { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .kanban-col { background: #f3f4f6; border-radius: 12px; padding: 14px; min-height: 300px; }
  .kanban-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .kanban-col-header span { font-size: 13px; font-weight: 700; }
  .col-count { background: rgba(0,0,0,.1); border-radius: 9999px; padding: 1px 7px; font-size: 11px; font-weight: 700; }
  .kanban-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; cursor: grab; box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: box-shadow .15s; }
  .kanban-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); }
  .kanban-card.dragging { opacity: .5; }
  .kanban-card-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .kanban-card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
  .tag-feature { background: var(--blue-light); color: var(--blue); }
  .tag-bug { background: var(--red-light); color: var(--red); }
  .tag-infra { background: var(--purple-light); color: var(--purple); }
  .tag-research { background: var(--amber-light); color: var(--amber); }
  .col-backlog .kanban-col-header span { color: #6b7280; }
  .col-progress .kanban-col-header span { color: var(--blue); }
  .col-review .kanban-col-header span { color: var(--amber); }
  .col-done .kanban-col-header span { color: var(--green); }
  .drop-zone { min-height: 50px; border-radius: 8px; border: 2px dashed transparent; transition: border-color .15s; }
  .drop-zone.drag-over { border-color: var(--green-light); background: var(--green-pale); }

  .milestone { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; }
  .milestone-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .milestone-dot.not-started { background: #d1d5db; }
  .milestone-dot.in-progress { background: var(--blue); }
  .milestone-dot.done { background: var(--green-light); }
  .milestone-dot.blocked { background: var(--red); }
  .milestone-info { flex: 1; }
  .milestone-title { font-size: 14px; font-weight: 600; }
  .milestone-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .milestone-status { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 9999px; cursor: pointer; }
  .status-not-started { background: #f3f4f6; color: #6b7280; }
  .status-in-progress { background: var(--blue-light); color: var(--blue); }
  .status-done { background: var(--green-pale); color: var(--green); }
  .status-blocked { background: var(--red-light); color: var(--red); }

  .todo-top { display: flex; gap: 10px; margin-bottom: 20px; }
  .todo-top input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 14px; background: var(--card); }
  .todo-top select { border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 14px; background: var(--card); }
  .todo-filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 14px; border-radius: 9999px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text-muted); transition: all .15s; }
  .filter-btn.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
  .todo-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: opacity .2s; }
  .todo-item.done-item { opacity: .55; }
  .todo-item.done-item .todo-text { text-decoration: line-through; color: var(--text-muted); }
  .todo-check { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
  .todo-check.checked { background: var(--green-light); border-color: var(--green-light); }
  .todo-check.checked::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 800; }
  .todo-text { flex: 1; font-size: 14px; }
  .todo-priority { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 9999px; }
  .p-high { background: var(--red-light); color: var(--red); }
  .p-medium { background: var(--amber-light); color: var(--amber); }
  .p-low { background: var(--blue-light); color: var(--blue); }
  .todo-date { font-size: 11px; color: var(--text-muted); }

  .log-add { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .log-add textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; background: var(--bg); }
  .log-add-footer { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .log-add-footer select { border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 14px; background: var(--card); }
  .log-entry { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; }
  .log-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .log-date { font-size: 12px; font-weight: 700; color: var(--green); }
  .log-category { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 9999px; }
  .cat-dev { background: var(--blue-light); color: var(--blue); }
  .cat-research { background: var(--purple-light); color: var(--purple); }
  .cat-testing { background: var(--amber-light); color: var(--amber); }
  .cat-deployment { background: var(--green-pale); color: var(--green); }
  .cat-planning { background: #f3e8ff; color: #7c3aed; }
  .log-text { font-size: 14px; line-height: 1.6; color: var(--text); }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  .del-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 6px; font-size: 16px; line-height: 1; transition: color .15s; }
  .del-btn:hover { color: var(--red); }

  /* Toast */
  #toast { position: fixed; bottom: 28px; right: 28px; background: var(--green-dark); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.2); transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999; pointer-events: none; }
  #toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 900px) {
    .stat-grid { grid-template-columns: repeat(2,1fr); }
    .kanban { grid-template-columns: repeat(2,1fr); }
    .dash-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    #sidebar { width: 60px; }
    #sidebar .nav-item span, .sidebar-logo h1, .sidebar-logo span, .sidebar-footer { display: none; }
    #main { margin-left: 60px; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .kanban { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sidebar-logo">
    <h1>🌾 Harvester</h1>
    <span>CropAccess AgriTech</span>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item active" data-view="dashboard">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span>Dashboard</span>
    </div>
    <div class="nav-item" data-view="pipeline">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
      <span>Pipeline</span>
    </div>
    <div class="nav-item" data-view="roadmap">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
      <span>Roadmap</span>
    </div>
    <div class="nav-item" data-view="todos">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      <span>To-Do</span>
    </div>
    <div class="nav-item" data-view="progress">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      <span>Progress Log</span>
    </div>
  </div>
  <div class="sidebar-footer">v1.1 · Local Storage</div>
</nav>

<div id="main">
  <div class="topbar">
    <h2 id="view-title">Dashboard</h2>
    <span class="topbar-date" id="topbar-date"></span>
  </div>
  <div class="content">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="stat-grid" id="stat-grid"></div>
      <div class="dash-grid">
        <div class="card">
          <div class="section-title">Pipeline Progress</div>
          <div id="pipeline-progress"></div>
        </div>
        <div class="card">
          <div class="section-title">Today's Tasks <span id="today-count" style="font-size:12px;color:var(--text-muted);font-weight:400"></span></div>
          <div id="today-tasks"></div>
        </div>
      </div>
      <div style="margin-top:20px" class="card">
        <div class="section-title">Recent Progress Logs</div>
        <div id="recent-logs"></div>
      </div>
    </div>

    <!-- PIPELINE -->
    <div class="view" id="view-pipeline">
      <div class="add-bar">
        <input id="task-input" placeholder="New pipeline task…" />
        <select id="task-type">
          <option value="feature">Feature</option>
          <option value="bug">Bug</option>
          <option value="infra">Infra</option>
          <option value="research">Research</option>
        </select>
        <select id="task-col">
          <option value="backlog">Backlog</option>
          <option value="progress">In Progress</option>
          <option value="review">Review</option>
          <option value="done">Done</option>
        </select>
        <button class="btn btn-primary" id="btn-add-task">+ Add Task</button>
      </div>
      <div class="kanban">
        <div class="kanban-col col-backlog">
          <div class="kanban-col-header"><span>Backlog</span><span class="col-count" id="count-backlog">0</span></div>
          <div class="drop-zone" id="drop-backlog"></div>
        </div>
        <div class="kanban-col col-progress">
          <div class="kanban-col-header"><span>In Progress</span><span class="col-count" id="count-progress">0</span></div>
          <div class="drop-zone" id="drop-progress"></div>
        </div>
        <div class="kanban-col col-review">
          <div class="kanban-col-header"><span>Review</span><span class="col-count" id="count-review">0</span></div>
          <div class="drop-zone" id="drop-review"></div>
        </div>
        <div class="kanban-col col-done">
          <div class="kanban-col-header"><span>Done</span><span class="col-count" id="count-done">0</span></div>
          <div class="drop-zone" id="drop-done"></div>
        </div>
      </div>
    </div>

    <!-- ROADMAP -->
    <div class="view" id="view-roadmap">
      <div class="add-bar">
        <input id="ms-title" placeholder="Milestone title…" />
        <input id="ms-date" type="date" />
        <select id="ms-status">
          <option value="not-started">Not Started</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
          <option value="blocked">Blocked</option>
        </select>
        <button class="btn btn-primary" id="btn-add-milestone">+ Add Milestone</button>
      </div>
      <div id="milestones-list"></div>
    </div>

    <!-- TO-DO -->
    <div class="view" id="view-todos">
      <div class="todo-top">
        <input id="todo-input" placeholder="Add a new task…" />
        <select id="todo-priority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
        <button class="btn btn-primary" id="btn-add-todo">+ Add</button>
      </div>
      <div class="todo-filters" id="todo-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="done">Done</button>
        <button class="filter-btn" data-filter="high">High Priority</button>
      </div>
      <div id="todos-list"></div>
    </div>

    <!-- PROGRESS LOG -->
    <div class="view" id="view-progress">
      <div class="log-add">
        <div class="section-title" style="margin-bottom:10px">Log Today's Progress</div>
        <textarea id="log-text" placeholder="What did you work on today? Any blockers? Any wins?"></textarea>
        <div class="log-add-footer">
          <select id="log-category">
            <option value="dev">Development</option>
            <option value="research">Research</option>
            <option value="testing">Testing</option>
            <option value="deployment">Deployment</option>
            <option value="planning">Planning</option>
          </select>
          <button class="btn btn-primary" id="btn-add-log">Save Log</button>
        </div>
      </div>
      <div id="logs-list"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  // ── Storage ──
  function sget(k) { try { return JSON.parse(localStorage.getItem('hv_' + k) || 'null'); } catch(e) { return null; } }
  function sset(k, v) { try { localStorage.setItem('hv_' + k, JSON.stringify(v)); } catch(e) {} }
  function load(k, def) { var v = sget(k); return v !== null ? v : def; }

  // ── State ──
  var tasks = load('tasks', [
    {id:1, title:'Sensor data ingestion module', type:'feature', col:'progress'},
    {id:2, title:'Crop yield prediction model', type:'research', col:'backlog'},
    {id:3, title:'IoT device connectivity fix', type:'bug', col:'review'},
    {id:4, title:'Field map UI component', type:'feature', col:'backlog'},
    {id:5, title:'Initial DB schema migration', type:'infra', col:'done'},
  ]);
  var milestones = load('milestones', [
    {id:1, title:'MVP Sensor Integration', date:'2026-06-15', status:'in-progress'},
    {id:2, title:'Field Data Dashboard v1', date:'2026-07-01', status:'not-started'},
    {id:3, title:'Yield Prediction Beta', date:'2026-08-01', status:'not-started'},
    {id:4, title:'Farmer App Launch', date:'2026-09-15', status:'not-started'},
    {id:5, title:'Infrastructure Setup', date:'2026-05-20', status:'done'},
  ]);
  var todos = load('todos', [
    {id:1, text:'Review sensor API docs', priority:'high', done:false, date:'2026-05-26'},
    {id:2, text:'Write unit tests for ingestion module', priority:'medium', done:false, date:'2026-05-26'},
    {id:3, text:'Update roadmap milestones', priority:'low', done:true, date:'2026-05-25'},
  ]);
  var logs = load('logs', [
    {id:1, text:'Set up initial project structure. Integrated IoT sensor mock data pipeline. Resolved CORS issue with field API.', category:'dev', date:'2026-05-25'},
  ]);
  var todoFilter = 'all';
  var dragId = null;
  var nextId = load('nextId', 100);

  function save() {
    sset('tasks', tasks); sset('milestones', milestones);
    sset('todos', todos); sset('logs', logs); sset('nextId', nextId);
  }
  function uid() { nextId++; return nextId; }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function today() { return new Date().toISOString().split('T')[0]; }
  function fmt(d) { return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }

  // ── Toast ──
  var toastTimer;
  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
  }

  // ── Nav ──
  var titles = { dashboard:'Dashboard', pipeline:'Pipeline', roadmap:'Roadmap', todos:'To-Do List', progress:'Progress Log' };
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.addEventListener('click', function() {
      document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
      document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
      el.classList.add('active');
      var v = el.getAttribute('data-view');
      document.getElementById('view-' + v).classList.add('active');
      document.getElementById('view-title').textContent = titles[v];
      if (v === 'dashboard') renderDashboard();
      if (v === 'pipeline') renderPipeline();
      if (v === 'roadmap') renderMilestones();
      if (v === 'todos') renderTodos();
      if (v === 'progress') renderLogs();
    });
  });

  // Set date
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('ms-date').value = today();

  // ── PIPELINE ──
  function addTask() {
    var inp = document.getElementById('task-input');
    var t = inp.value.trim();
    if (!t) { inp.focus(); inp.style.border = '1.5px solid var(--red)'; setTimeout(function(){ inp.style.border = ''; }, 1200); return; }
    tasks.push({id:uid(), title:t, type:document.getElementById('task-type').value, col:document.getElementById('task-col').value});
    inp.value = '';
    save(); renderPipeline(); renderDashboard();
    toast('Task added to pipeline ✓');
  }

  document.getElementById('btn-add-task').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', function(e){ if(e.key==='Enter') addTask(); });

  // Kanban drag & drop via event delegation
  ['backlog','progress','review','done'].forEach(function(col) {
    var zone = document.getElementById('drop-' + col);
    zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', function(){ zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', function(e){
      e.preventDefault(); zone.classList.remove('drag-over');
      if (dragId !== null) {
        var t = tasks.find(function(x){ return x.id === dragId; });
        if (t) { t.col = col; save(); renderPipeline(); renderDashboard(); }
        dragId = null;
      }
    });
    // Delete via delegation
    zone.addEventListener('click', function(e){
      var btn = e.target.closest('.del-btn');
      if (btn) {
        var id = parseInt(btn.getAttribute('data-id'), 10);
        tasks = tasks.filter(function(x){ return x.id !== id; });
        save(); renderPipeline(); renderDashboard();
        toast('Task removed');
      }
    });
  });

  function renderPipeline() {
    ['backlog','progress','review','done'].forEach(function(c) {
      var zone = document.getElementById('drop-' + c);
      var filtered = tasks.filter(function(t){ return t.col === c; });
      document.getElementById('count-' + c).textContent = filtered.length;
      if (!filtered.length) {
        zone.innerHTML = '<div style="font-size:12px;color:#9ca3af;padding:8px 4px;">Drop tasks here</div>';
      } else {
        zone.innerHTML = filtered.map(function(t){
          return '<div class="kanban-card" draggable="true" data-id="' + t.id + '">' +
            '<div class="kanban-card-title">' + esc(t.title) + '</div>' +
            '<div class="kanban-card-meta">' +
              '<span class="tag tag-' + t.type + '">' + t.type + '</span>' +
              '<button class="del-btn" data-id="' + t.id + '" title="Remove">×</button>' +
            '</div></div>';
        }).join('');
        // Wire drag events
        zone.querySelectorAll('.kanban-card').forEach(function(card){
          card.addEventListener('dragstart', function(e){
            dragId = parseInt(card.getAttribute('data-id'), 10);
            card.classList.add('dragging');
          });
          card.addEventListener('dragend', function(){
            card.classList.remove('dragging');
          });
        });
      }
    });
  }

  // ── ROADMAP ──
  function addMilestone() {
    var inp = document.getElementById('ms-title');
    var t = inp.value.trim();
    if (!t) { inp.focus(); inp.style.border = '1.5px solid var(--red)'; setTimeout(function(){ inp.style.border = ''; }, 1200); return; }
    milestones.push({id:uid(), title:t, date:document.getElementById('ms-date').value, status:document.getElementById('ms-status').value});
    inp.value = '';
    milestones.sort(function(a,b){ return a.date > b.date ? 1 : -1; });
    save(); renderMilestones();
    toast('Milestone added ✓');
  }

  document.getElementById('btn-add-milestone').addEventListener('click', addMilestone);
  document.getElementById('ms-title').addEventListener('keydown', function(e){ if(e.key==='Enter') addMilestone(); });

  document.getElementById('milestones-list').addEventListener('click', function(e) {
    var btn = e.target.closest('.del-btn');
    var badge = e.target.closest('.milestone-status');
    if (btn) {
      var id = parseInt(btn.getAttribute('data-id'), 10);
      milestones = milestones.filter(function(m){ return m.id !== id; });
      save(); renderMilestones(); toast('Milestone removed');
    }
    if (badge) {
      var id = parseInt(badge.getAttribute('data-id'), 10);
      var cycle = ['not-started','in-progress','done','blocked'];
      var m = milestones.find(function(x){ return x.id === id; });
      if (m) { m.status = cycle[(cycle.indexOf(m.status)+1) % cycle.length]; save(); renderMilestones(); }
    }
  });

  function renderMilestones() {
    var el = document.getElementById('milestones-list');
    if (!milestones.length) { el.innerHTML = '<div class="empty">No milestones yet. Add your first one above.</div>'; return; }
    el.innerHTML = milestones.map(function(m){
      return '<div class="milestone">' +
        '<div class="milestone-dot ' + m.status + '"></div>' +
        '<div class="milestone-info">' +
          '<div class="milestone-title">' + esc(m.title) + '</div>' +
          '<div class="milestone-meta">Target: ' + (m.date ? fmt(m.date) : 'No date') + '</div>' +
        '</div>' +
        '<span class="milestone-status status-' + m.status + '" data-id="' + m.id + '" title="Click to change status">' + m.status.replace('-',' ') + '</span>' +
        '<button class="del-btn" data-id="' + m.id + '" title="Remove">×</button>' +
      '</div>';
    }).join('');
  }

  // ── TO-DO ──
  function addTodo() {
    var inp = document.getElementById('todo-input');
    var t = inp.value.trim();
    if (!t) { inp.focus(); inp.style.border = '1.5px solid var(--red)'; setTimeout(function(){ inp.style.border = ''; }, 1200); return; }
    todos.unshift({id:uid(), text:t, priority:document.getElementById('todo-priority').value, done:false, date:today()});
    inp.value = '';
    save(); renderTodos(); renderDashboard();
    toast('Task added ✓');
  }

  document.getElementById('btn-add-todo').addEventListener('click', addTodo);
  document.getElementById('todo-input').addEventListener('keydown', function(e){ if(e.key==='Enter') addTodo(); });

  document.getElementById('todo-filters').addEventListener('click', function(e){
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    todoFilter = btn.getAttribute('data-filter');
    renderTodos();
  });

  document.getElementById('todos-list').addEventListener('click', function(e){
    var check = e.target.closest('.todo-check');
    var del = e.target.closest('.del-btn');
    if (check) {
      var id = parseInt(check.getAttribute('data-id'), 10);
      var t = todos.find(function(x){ return x.id === id; });
      if (t) { t.done = !t.done; save(); renderTodos(); renderDashboard(); }
    }
    if (del) {
      var id = parseInt(del.getAttribute('data-id'), 10);
      todos = todos.filter(function(x){ return x.id !== id; });
      save(); renderTodos(); renderDashboard(); toast('Task removed');
    }
  });

  function renderTodos() {
    var filtered = todos;
    if (todoFilter === 'active') filtered = todos.filter(function(t){ return !t.done; });
    else if (todoFilter === 'done') filtered = todos.filter(function(t){ return t.done; });
    else if (todoFilter === 'high') filtered = todos.filter(function(t){ return t.priority === 'high'; });
    var el = document.getElementById('todos-list');
    if (!filtered.length) { el.innerHTML = '<div class="empty">No tasks here.</div>'; return; }
    el.innerHTML = filtered.map(function(t){
      return '<div class="todo-item' + (t.done ? ' done-item' : '') + '">' +
        '<div class="todo-check' + (t.done ? ' checked' : '') + '" data-id="' + t.id + '"></div>' +
        '<span class="todo-text">' + esc(t.text) + '</span>' +
        '<span class="todo-priority p-' + t.priority + '">' + t.priority + '</span>' +
        '<span class="todo-date">' + t.date + '</span>' +
        '<button class="del-btn" data-id="' + t.id + '">×</button>' +
      '</div>';
    }).join('');
  }

  // ── PROGRESS LOG ──
  function addLog() {
    var ta = document.getElementById('log-text');
    var t = ta.value.trim();
    if (!t) { ta.focus(); ta.style.border = '1.5px solid var(--red)'; setTimeout(function(){ ta.style.border = ''; }, 1200); return; }
    logs.unshift({id:uid(), text:t, category:document.getElementById('log-category').value, date:today()});
    ta.value = '';
    save(); renderLogs(); renderDashboard();
    toast('Progress logged ✓');
  }

  document.getElementById('btn-add-log').addEventListener('click', addLog);

  document.getElementById('logs-list').addEventListener('click', function(e){
    var btn = e.target.closest('.del-btn');
    if (btn) {
      var id = parseInt(btn.getAttribute('data-id'), 10);
      logs = logs.filter(function(x){ return x.id !== id; });
      save(); renderLogs(); renderDashboard(); toast('Log removed');
    }
  });

  function renderLogs() {
    var el = document.getElementById('logs-list');
    if (!logs.length) { el.innerHTML = '<div class="empty">No logs yet. Start logging your daily progress above.</div>'; return; }
    el.innerHTML = logs.map(function(l){
      return '<div class="log-entry">' +
        '<div class="log-entry-header">' +
          '<span class="log-date">' + fmt(l.date) + '</span>' +
          '<div style="display:flex;gap:8px;align-items:center">' +
            '<span class="log-category cat-' + l.category + '">' + l.category + '</span>' +
            '<button class="del-btn" data-id="' + l.id + '">×</button>' +
          '</div>' +
        '</div>' +
        '<div class="log-text">' + esc(l.text) + '</div>' +
      '</div>';
    }).join('');
  }

  // ── DASHBOARD ──
  function renderDashboard() {
    var total = tasks.length;
    var doneCount = tasks.filter(function(t){ return t.col === 'done'; }).length;
    var inprog = tasks.filter(function(t){ return t.col === 'progress'; }).length;
    var todayStr = today();
    var todayTodos = todos.filter(function(t){ return t.date === todayStr; });
    var todayDone = todayTodos.filter(function(t){ return t.done; }).length;

    document.getElementById('stat-grid').innerHTML =
      '<div class="stat green"><div class="stat-label">Tasks Done</div><div class="stat-val">' + doneCount + '</div><div class="stat-sub">of ' + total + ' total</div></div>' +
      '<div class="stat blue"><div class="stat-label">In Progress</div><div class="stat-val">' + inprog + '</div><div class="stat-sub">pipeline tasks</div></div>' +
      '<div class="stat amber"><div class="stat-label">Today\'s Todos</div><div class="stat-val">' + todayDone + '/' + todayTodos.length + '</div><div class="stat-sub">completed today</div></div>' +
      '<div class="stat red"><div class="stat-label">Milestones</div><div class="stat-val">' + milestones.filter(function(m){ return m.status==='done'; }).length + '/' + milestones.length + '</div><div class="stat-sub">completed</div></div>';

    var cols = [{k:'backlog',label:'Backlog',cl:''},{k:'progress',label:'In Progress',cl:'amber'},{k:'review',label:'Review',cl:'amber'},{k:'done',label:'Done',cl:''}];
    document.getElementById('pipeline-progress').innerHTML = cols.map(function(c){
      var n = tasks.filter(function(t){ return t.col === c.k; }).length;
      var pct = total ? Math.round(n/total*100) : 0;
      return '<div class="progress-bar-wrap"><div class="progress-label"><span>' + c.label + '</span><span>' + n + ' task' + (n!==1?'s':'') + ' (' + pct + '%)</span></div>' +
        '<div class="progress-track"><div class="progress-fill ' + c.cl + '" style="width:' + pct + '%"></div></div></div>';
    }).join('');

    var todayEl = document.getElementById('today-tasks');
    document.getElementById('today-count').textContent = '(' + todayDone + '/' + todayTodos.length + ' done)';
    if (!todayTodos.length) {
      todayEl.innerHTML = '<div class="empty" style="padding:16px">No tasks for today yet. Add some in To-Do.</div>';
    } else {
      todayEl.innerHTML = todayTodos.slice(0,5).map(function(t){
        return '<div class="todo-item" style="margin-bottom:6px;' + (t.done?'opacity:.5':'') + '">' +
          '<div class="todo-check' + (t.done?' checked':'') + '" data-id="' + t.id + '"></div>' +
          '<span class="todo-text" style="' + (t.done?'text-decoration:line-through;color:var(--text-muted)':'') + '">' + esc(t.text) + '</span>' +
          '<span class="todo-priority p-' + t.priority + '">' + t.priority + '</span>' +
        '</div>';
      }).join('');
      // Wire checkbox clicks on dashboard
      todayEl.querySelectorAll('.todo-check').forEach(function(ch){
        ch.addEventListener('click', function(){
          var id = parseInt(ch.getAttribute('data-id'), 10);
          var t = todos.find(function(x){ return x.id === id; });
          if (t) { t.done = !t.done; save(); renderDashboard(); }
        });
      });
    }

    var recentEl = document.getElementById('recent-logs');
    if (!logs.length) {
      recentEl.innerHTML = '<div class="empty" style="padding:16px">No logs yet.</div>';
    } else {
      recentEl.innerHTML = logs.slice(0,3).map(function(l){
        return '<div style="padding:10px 0;border-bottom:1px solid var(--border)">' +
          '<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">' +
            '<span class="log-date">' + fmt(l.date) + '</span>' +
            '<span class="log-category cat-' + l.category + '">' + l.category + '</span>' +
          '</div>' +
          '<div class="log-text" style="font-size:13px">' + esc(l.text).substring(0,150) + (l.text.length > 150 ? '…' : '') + '</div>' +
        '</div>';
      }).join('');
    }
  }

  // ── Init ──
  renderDashboard();
  renderPipeline();

})();
</script>
</body>
</html>
