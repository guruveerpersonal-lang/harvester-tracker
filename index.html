<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvester — CropAccess AgriTech</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
header{background:linear-gradient(135deg,#1a4731,#2d7a4f);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
header h1{font-size:22px;font-weight:800;letter-spacing:.3px}
header h1 em{font-style:normal;font-weight:400;font-size:13px;opacity:.7;margin-left:8px}
.tabs{display:flex;gap:4px;background:rgba(0,0,0,.2);border-radius:10px;padding:4px}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);cursor:pointer;border:none;background:none;transition:.15s}
.tab:hover{color:#fff}
.tab.active{background:#fff;color:#1a4731}
main{max-width:960px;margin:0 auto;padding:24px 20px}
.page{display:none}
.page.active{display:block}

/* Cards & forms */
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.add-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.add-row input,.add-row select{border:1.5px solid #ddd;border-radius:10px;padding:10px 14px;font-size:14px;background:#fff;outline:none;transition:.15s}
.add-row input:focus,.add-row select:focus{border-color:#2d7a4f}
.add-row input{flex:1;min-width:180px}
.add-row select{min-width:120px}
textarea{width:100%;border:1.5px solid #ddd;border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;resize:vertical;min-height:90px;outline:none;transition:.15s}
textarea:focus{border-color:#2d7a4f}
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.15s}
.btn-green{background:#2d7a4f;color:#fff}
.btn-green:hover{background:#1a4731}
.btn-green:active{transform:scale(.97)}

/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.tag-feature{background:#dbeafe;color:#2563eb}
.tag-bug{background:#fee2e2;color:#dc2626}
.tag-infra{background:#ede9fe;color:#7c3aed}
.tag-research{background:#fef3c7;color:#d97706}
.tag-high{background:#fee2e2;color:#dc2626}
.tag-medium{background:#fef3c7;color:#d97706}
.tag-low{background:#dbeafe;color:#2563eb}
.tag-dev{background:#dbeafe;color:#2563eb}
.tag-testing{background:#fef3c7;color:#d97706}
.tag-deployment{background:#d1fae5;color:#059669}
.tag-planning{background:#ede9fe;color:#7c3aed}

/* Items */
.item{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid #eee;border-radius:12px;margin-bottom:8px;background:#fff;transition:.15s;animation:fadeIn .25s}
.item:hover{border-color:#c8e6c9}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.item-text{flex:1;font-size:14px;font-weight:500}
.item-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.x-btn{width:28px;height:28px;border-radius:8px;border:none;background:#f3f4f6;color:#9ca3af;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.x-btn:hover{background:#fee2e2;color:#dc2626}

/* Checkbox */
.check{width:22px;height:22px;border-radius:7px;border:2px solid #d1d5db;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;background:#fff}
.check.on{background:#2d7a4f;border-color:#2d7a4f}
.check.on::after{content:'✓';color:#fff;font-size:13px;font-weight:800}
.done-text{text-decoration:line-through;opacity:.45}

/* Pipeline columns */
.pipeline-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.col{background:#f3f4f6;border-radius:14px;padding:14px;min-height:200px}
.col-head{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.col-head .cnt{background:rgba(0,0,0,.1);border-radius:99px;padding:2px 8px;font-size:11px}
.col-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:8px;cursor:grab;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:.15s}
.col-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.col-card .title{font-size:13px;font-weight:600;margin-bottom:6px}
.col-card .meta{display:flex;gap:6px;align-items:center}

/* Milestone */
.ms-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.ms-dot.not-started{background:#d1d5db}.ms-dot.in-progress{background:#3b82f6}.ms-dot.done{background:#22c55e}.ms-dot.blocked{background:#ef4444}
.ms-badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer}
.ms-badge.not-started{background:#f3f4f6;color:#6b7280}.ms-badge.in-progress{background:#dbeafe;color:#2563eb}.ms-badge.done{background:#d1fae5;color:#059669}.ms-badge.blocked{background:#fee2e2;color:#dc2626}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#6b7280}
.stat-num{font-size:30px;font-weight:800;margin:4px 0}
.stat-num.green{color:#2d7a4f}.stat-num.blue{color:#3b82f6}.stat-num.amber{color:#d97706}.stat-num.red{color:#ef4444}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a4731;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.2);opacity:0;transition:.3s;z-index:999;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.empty{text-align:center;padding:32px;color:#9ca3af;font-size:14px}

/* Filters */
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;transition:.15s}
.fbtn.active{background:#1a4731;color:#fff;border-color:#1a4731}

/* Log */
.log-entry{padding:14px 0;border-bottom:1px solid #f0f0f0}
.log-entry:last-child{border:none}
.log-head{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.log-date{font-size:12px;font-weight:700;color:#2d7a4f}
.log-body{font-size:14px;line-height:1.6;color:#374151}

@media(max-width:768px){
  .stats{grid-template-columns:1fr 1fr}
  .pipeline-grid{grid-template-columns:1fr 1fr}
  .tabs{flex-wrap:wrap}
  header{flex-direction:column;gap:12px;text-align:center}
}
@media(max-width:500px){
  .pipeline-grid{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr}
  .add-row{flex-direction:column}
}
</style>
</head>
<body>

<header>
  <h1>🌾 Harvester<em>CropAccess AgriTech</em></h1>
  <div class="tabs" id="tabs">
    <button class="tab active" data-p="dashboard">Dashboard</button>
    <button class="tab" data-p="pipeline">Pipeline</button>
    <button class="tab" data-p="roadmap">Roadmap</button>
    <button class="tab" data-p="todo">To-Do</button>
    <button class="tab" data-p="logs">Progress</button>
  </div>
</header>

<main>
  <!-- DASHBOARD -->
  <div class="page active" id="p-dashboard">
    <div class="stats" id="stats"></div>
    <div class="card"><h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Today's Tasks</h3><div id="dash-today"></div></div>
    <div class="card" style="margin-top:16px"><h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Recent Logs</h3><div id="dash-logs"></div></div>
  </div>

  <!-- PIPELINE -->
  <div class="page" id="p-pipeline">
    <div class="add-row">
      <input type="text" id="pi-input" placeholder="New pipeline task...">
      <select id="pi-type"><option>feature</option><option>bug</option><option>infra</option><option>research</option></select>
      <select id="pi-col"><option value="backlog">Backlog</option><option value="progress">In Progress</option><option value="review">Review</option><option value="done">Done</option></select>
      <button class="btn btn-green" id="pi-add">+ Add Task</button>
    </div>
    <div class="pipeline-grid">
      <div class="col"><div class="col-head">Backlog <span class="cnt" id="c-backlog">0</span></div><div id="z-backlog"></div></div>
      <div class="col"><div class="col-head" style="color:#2563eb">In Progress <span class="cnt" id="c-progress">0</span></div><div id="z-progress"></div></div>
      <div class="col"><div class="col-head" style="color:#d97706">Review <span class="cnt" id="c-review">0</span></div><div id="z-review"></div></div>
      <div class="col"><div class="col-head" style="color:#22c55e">Done <span class="cnt" id="c-done">0</span></div><div id="z-done"></div></div>
    </div>
  </div>

  <!-- ROADMAP -->
  <div class="page" id="p-roadmap">
    <div class="add-row">
      <input type="text" id="ms-input" placeholder="Milestone title...">
      <input type="date" id="ms-date">
      <select id="ms-status"><option value="not-started">Not Started</option><option value="in-progress">In Progress</option><option value="done">Done</option><option value="blocked">Blocked</option></select>
      <button class="btn btn-green" id="ms-add">+ Add Milestone</button>
    </div>
    <div id="ms-list"></div>
  </div>

  <!-- TO-DO -->
  <div class="page" id="p-todo">
    <div class="add-row">
      <input type="text" id="td-input" placeholder="Add a new task...">
      <select id="td-pri"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select>
      <button class="btn btn-green" id="td-add">+ Add Task</button>
    </div>
    <div class="filters" id="td-filters">
      <button class="fbtn active" data-f="all">All</button>
      <button class="fbtn" data-f="active">Active</button>
      <button class="fbtn" data-f="done">Done</button>
      <button class="fbtn" data-f="high">High Priority</button>
    </div>
    <div id="td-list"></div>
  </div>

  <!-- PROGRESS LOG -->
  <div class="page" id="p-logs">
    <div class="card" style="margin-bottom:20px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:10px">Log Today's Progress</h3>
      <textarea id="lg-text" placeholder="What did you work on today?"></textarea>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center">
        <select id="lg-cat" style="border:1.5px solid #ddd;border-radius:10px;padding:10px 14px;font-size:14px"><option value="dev">Development</option><option value="research">Research</option><option value="testing">Testing</option><option value="deployment">Deployment</option><option value="planning">Planning</option></select>
        <button class="btn btn-green" id="lg-add">Save Log</button>
      </div>
    </div>
    <div id="lg-list"></div>
  </div>
</main>

<div id="toast"></div>

<script>
(function(){
  /* ─── Storage ─── */
  function g(k){try{var v=localStorage.getItem('hv_'+k);return v?JSON.parse(v):null}catch(e){return null}}
  function s(k,v){try{localStorage.setItem('hv_'+k,JSON.stringify(v))}catch(e){}}

  /* ─── State ─── */
  var tasks=g('tasks')||[
    {id:1,title:'Sensor data ingestion module',type:'feature',col:'progress'},
    {id:2,title:'Crop yield prediction model',type:'research',col:'backlog'},
    {id:3,title:'IoT device connectivity fix',type:'bug',col:'review'},
    {id:4,title:'Field map UI component',type:'feature',col:'backlog'},
    {id:5,title:'Initial DB schema migration',type:'infra',col:'done'}
  ];
  var milestones=g('milestones')||[
    {id:1,title:'MVP Sensor Integration',date:'2026-06-15',status:'in-progress'},
    {id:2,title:'Field Data Dashboard v1',date:'2026-07-01',status:'not-started'},
    {id:3,title:'Yield Prediction Beta',date:'2026-08-01',status:'not-started'},
    {id:4,title:'Farmer App Launch',date:'2026-09-15',status:'not-started'},
    {id:5,title:'Infrastructure Setup',date:'2026-05-20',status:'done'}
  ];
  var todos=g('todos')||[
    {id:1,text:'Review sensor API docs',pri:'high',done:false,date:'2026-05-26'},
    {id:2,text:'Write unit tests for ingestion',pri:'medium',done:false,date:'2026-05-26'},
    {id:3,text:'Update roadmap milestones',pri:'low',done:true,date:'2026-05-25'}
  ];
  todos.forEach(function(t){if(t.priority&&!t.pri){t.pri=t.priority}if(!t.pri)t.pri='medium'});
  var logs=g('logs')||[
    {id:1,text:'Set up initial project structure. Integrated IoT sensor mock data pipeline.',cat:'dev',date:'2026-05-25'}
  ];
  logs.forEach(function(l){if(l.category&&!l.cat){l.cat=l.category}if(!l.cat)l.cat='dev'});
  var nid=g('nid')||100;
  var filter='all';
  var dragId=null;

  function save(){s('tasks',tasks);s('milestones',milestones);s('todos',todos);s('logs',logs);s('nid',nid)}
  function id(){return++nid}
  function esc(x){var d=document.createElement('div');d.textContent=x;return d.innerHTML}
  function today(){return new Date().toISOString().split('T')[0]}
  function fmt(d){try{return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}catch(e){return d}}

  /* ─── Toast ─── */
  var tt;
  function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){e.classList.remove('show')},2200)}

  /* ─── $(id) helper ─── */
  function $(x){return document.getElementById(x)}

  /* ─── Tabs ─── */
  $('tabs').addEventListener('click',function(e){
    var t=e.target.closest('.tab');
    if(!t)return;
    document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    t.classList.add('active');
    $('p-'+t.getAttribute('data-p')).classList.add('active');
    renderAll();
  });

  /* ════════════════════════════════════════
     PIPELINE
     ════════════════════════════════════════ */
  $('pi-add').addEventListener('click',function(){
    var inp=$('pi-input');
    var v=inp.value.trim();
    if(!v){inp.focus();inp.style.borderColor='#ef4444';setTimeout(function(){inp.style.borderColor=''},1000);return}
    tasks.push({id:id(),title:v,type:$('pi-type').value,col:$('pi-col').value});
    inp.value='';
    save();renderPipeline();renderDash();
    toast('Task added!');
  });
  $('pi-input').addEventListener('keydown',function(e){if(e.key==='Enter')$('pi-add').click()});

  var cols=['backlog','progress','review','done'];
  cols.forEach(function(c){
    var zone=$('z-'+c);
    zone.addEventListener('dragover',function(e){e.preventDefault();zone.style.background='#d1fae5'});
    zone.addEventListener('dragleave',function(){zone.style.background=''});
    zone.addEventListener('drop',function(e){
      e.preventDefault();zone.style.background='';
      if(dragId!==null){
        for(var i=0;i<tasks.length;i++){if(tasks[i].id===dragId){tasks[i].col=c;break}}
        dragId=null;save();renderPipeline();renderDash();
      }
    });
    zone.addEventListener('click',function(e){
      var btn=e.target.closest('.x-btn');
      if(!btn)return;
      var xid=Number(btn.getAttribute('data-id'));
      tasks=tasks.filter(function(t){return t.id!==xid});
      save();renderPipeline();renderDash();toast('Removed');
    });
  });

  function renderPipeline(){
    cols.forEach(function(c){
      var zone=$('z-'+c);
      var items=tasks.filter(function(t){return t.col===c});
      $('c-'+c).textContent=items.length;
      if(!items.length){zone.innerHTML='<div class="empty" style="padding:16px;font-size:12px">Drop here</div>';return}
      zone.innerHTML=items.map(function(t){
        return '<div class="col-card" draggable="true" data-id="'+t.id+'">'+
          '<div class="title">'+esc(t.title)+'</div>'+
          '<div class="meta"><span class="tag tag-'+t.type+'">'+t.type+'</span>'+
          '<button class="x-btn" data-id="'+t.id+'">&times;</button></div></div>';
      }).join('');
      zone.querySelectorAll('.col-card').forEach(function(card){
        card.addEventListener('dragstart',function(){dragId=Number(card.getAttribute('data-id'));card.style.opacity='.4'});
        card.addEventListener('dragend',function(){card.style.opacity='1'});
      });
    });
  }

  /* ════════════════════════════════════════
     ROADMAP
     ════════════════════════════════════════ */
  $('ms-date').value=today();

  $('ms-add').addEventListener('click',function(){
    var inp=$('ms-input');
    var v=inp.value.trim();
    if(!v){inp.focus();inp.style.borderColor='#ef4444';setTimeout(function(){inp.style.borderColor=''},1000);return}
    milestones.push({id:id(),title:v,date:$('ms-date').value,status:$('ms-status').value});
    inp.value='';
    milestones.sort(function(a,b){return a.date>b.date?1:-1});
    save();renderMilestones();renderDash();
    toast('Milestone added!');
  });
  $('ms-input').addEventListener('keydown',function(e){if(e.key==='Enter')$('ms-add').click()});

  $('ms-list').addEventListener('click',function(e){
    var btn=e.target.closest('.x-btn');
    var badge=e.target.closest('.ms-badge');
    if(btn){
      var xid=Number(btn.getAttribute('data-id'));
      milestones=milestones.filter(function(m){return m.id!==xid});
      save();renderMilestones();renderDash();toast('Removed');
    }
    if(badge){
      var xid=Number(badge.getAttribute('data-id'));
      var cycle=['not-started','in-progress','done','blocked'];
      for(var i=0;i<milestones.length;i++){
        if(milestones[i].id===xid){
          var ci=cycle.indexOf(milestones[i].status);
          milestones[i].status=cycle[(ci+1)%4];
          break;
        }
      }
      save();renderMilestones();renderDash();
    }
  });

  function renderMilestones(){
    var el=$('ms-list');
    if(!milestones.length){el.innerHTML='<div class="empty">No milestones. Add one above.</div>';return}
    el.innerHTML=milestones.map(function(m){
      return '<div class="item"><div class="ms-dot '+m.status+'"></div>'+
        '<div class="item-text"><strong>'+esc(m.title)+'</strong><br><span style="font-size:12px;color:#6b7280">Target: '+fmt(m.date)+'</span></div>'+
        '<span class="ms-badge '+m.status+'" data-id="'+m.id+'" title="Click to change">'+m.status.replace(/-/g,' ')+'</span>'+
        '<button class="x-btn" data-id="'+m.id+'">&times;</button></div>';
    }).join('');
  }

  /* ════════════════════════════════════════
     TO-DO
     ════════════════════════════════════════ */
  $('td-add').addEventListener('click',function(){
    var inp=$('td-input');
    var v=inp.value.trim();
    if(!v){inp.focus();inp.style.borderColor='#ef4444';setTimeout(function(){inp.style.borderColor=''},1000);return}
    todos.unshift({id:id(),text:v,pri:$('td-pri').value,done:false,date:today()});
    inp.value='';
    save();renderTodos();renderDash();
    toast('Task added!');
  });
  $('td-input').addEventListener('keydown',function(e){if(e.key==='Enter')$('td-add').click()});

  $('td-filters').addEventListener('click',function(e){
    var btn=e.target.closest('.fbtn');
    if(!btn)return;
    document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    filter=btn.getAttribute('data-f');
    renderTodos();
  });

  $('td-list').addEventListener('click',function(e){
    var chk=e.target.closest('.check');
    var btn=e.target.closest('.x-btn');
    if(chk){
      var xid=Number(chk.getAttribute('data-id'));
      for(var i=0;i<todos.length;i++){if(todos[i].id===xid){todos[i].done=!todos[i].done;break}}
      save();renderTodos();renderDash();
    }
    if(btn){
      var xid=Number(btn.getAttribute('data-id'));
      todos=todos.filter(function(t){return t.id!==xid});
      save();renderTodos();renderDash();toast('Removed');
    }
  });

  function renderTodos(){
    var list=todos;
    if(filter==='active')list=todos.filter(function(t){return!t.done});
    else if(filter==='done')list=todos.filter(function(t){return t.done});
    else if(filter==='high')list=todos.filter(function(t){return t.pri==='high'});
    var el=$('td-list');
    if(!list.length){el.innerHTML='<div class="empty">No tasks here.</div>';return}
    el.innerHTML=list.map(function(t){
      return '<div class="item"><div class="check'+(t.done?' on':'')+'" data-id="'+t.id+'"></div>'+
        '<span class="item-text'+(t.done?' done-text':'')+'">'+esc(t.text)+'</span>'+
        '<span class="tag tag-'+t.pri+'">'+t.pri+'</span>'+
        '<span style="font-size:11px;color:#9ca3af">'+t.date+'</span>'+
        '<button class="x-btn" data-id="'+t.id+'">&times;</button></div>';
    }).join('');
  }

  /* ════════════════════════════════════════
     PROGRESS LOG
     ════════════════════════════════════════ */
  $('lg-add').addEventListener('click',function(){
    var ta=$('lg-text');
    var v=ta.value.trim();
    if(!v){ta.focus();ta.style.borderColor='#ef4444';setTimeout(function(){ta.style.borderColor=''},1000);return}
    logs.unshift({id:id(),text:v,cat:$('lg-cat').value,date:today()});
    ta.value='';
    save();renderLogs();renderDash();
    toast('Progress logged!');
  });

  $('lg-list').addEventListener('click',function(e){
    var btn=e.target.closest('.x-btn');
    if(!btn)return;
    var xid=Number(btn.getAttribute('data-id'));
    logs=logs.filter(function(l){return l.id!==xid});
    save();renderLogs();renderDash();toast('Removed');
  });

  function renderLogs(){
    var el=$('lg-list');
    if(!logs.length){el.innerHTML='<div class="empty">No logs yet.</div>';return}
    el.innerHTML='<div class="card">'+logs.map(function(l){
      return '<div class="log-entry"><div class="log-head"><span class="log-date">'+fmt(l.date)+'</span>'+
        '<span class="tag tag-'+l.cat+'">'+l.cat+'</span>'+
        '<button class="x-btn" data-id="'+l.id+'" style="margin-left:auto">&times;</button></div>'+
        '<div class="log-body">'+esc(l.text)+'</div></div>';
    }).join('')+'</div>';
  }

  /* ════════════════════════════════════════
     DASHBOARD
     ════════════════════════════════════════ */
  function renderDash(){
    var total=tasks.length;
    var dn=tasks.filter(function(t){return t.col==='done'}).length;
    var ip=tasks.filter(function(t){return t.col==='progress'}).length;
    var td=today();
    var tt=todos.filter(function(t){return t.date===td});
    var tc=tt.filter(function(t){return t.done}).length;
    var mc=milestones.filter(function(m){return m.status==='done'}).length;

    $('stats').innerHTML=
      '<div class="stat"><div class="stat-label">Tasks Done</div><div class="stat-num green">'+dn+'/'+total+'</div></div>'+
      '<div class="stat"><div class="stat-label">In Progress</div><div class="stat-num blue">'+ip+'</div></div>'+
      '<div class="stat"><div class="stat-label">Today\'s Todos</div><div class="stat-num amber">'+tc+'/'+tt.length+'</div></div>'+
      '<div class="stat"><div class="stat-label">Milestones</div><div class="stat-num red">'+mc+'/'+milestones.length+'</div></div>';

    var dtEl=$('dash-today');
    if(!tt.length){dtEl.innerHTML='<div class="empty">No tasks for today. Add some in To-Do.</div>'}
    else{
      dtEl.innerHTML=tt.slice(0,5).map(function(t){
        return '<div class="item" style="margin-bottom:6px"><div class="check'+(t.done?' on':'')+'" data-id="'+t.id+'"></div>'+
          '<span class="item-text'+(t.done?' done-text':'')+'">'+esc(t.text)+'</span>'+
          '<span class="tag tag-'+t.pri+'">'+t.pri+'</span></div>';
      }).join('');
      dtEl.addEventListener('click',function(e){
        var chk=e.target.closest('.check');
        if(!chk)return;
        var xid=Number(chk.getAttribute('data-id'));
        for(var i=0;i<todos.length;i++){if(todos[i].id===xid){todos[i].done=!todos[i].done;break}}
        save();renderDash();
      });
    }

    var dlEl=$('dash-logs');
    if(!logs.length){dlEl.innerHTML='<div class="empty">No logs yet.</div>'}
    else{
      dlEl.innerHTML=logs.slice(0,3).map(function(l){
        return '<div style="padding:8px 0;border-bottom:1px solid #f0f0f0"><div class="log-head"><span class="log-date">'+fmt(l.date)+'</span><span class="tag tag-'+l.cat+'">'+l.cat+'</span></div>'+
          '<div style="font-size:13px;color:#374151;margin-top:4px">'+esc(l.text).substring(0,120)+(l.text.length>120?'...':'')+'</div></div>';
      }).join('');
    }
  }

  /* ─── Render all ─── */
  function renderAll(){renderDash();renderPipeline();renderMilestones();renderTodos();renderLogs()}
  renderAll();

})();
</script>
</body>
</html>
